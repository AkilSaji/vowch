name: Vowch full infrastructure and application deployment

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      COGNITO_ADMIN_TEST_TOKEN: ${{ secrets.COGNITO_ADMIN_TEST_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: aws-actions/setup-sam@v2
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Validate CloudFormation templates
        run: |
          aws cloudformation validate-template --template-body file://infra/bootstrap.yaml
          aws cloudformation validate-template --template-body file://infra/security.yaml
          aws cloudformation validate-template --template-body file://backend/template.yaml
      - name: Install and test backend
        run: npm ci --prefix backend && npm test --prefix backend && npm run lint --prefix backend
      - name: Deploy bootstrap stack
        run: |
          aws cloudformation deploy --template-file infra/bootstrap.yaml --stack-name vowch-bootstrap-dev --capabilities CAPABILITY_NAMED_IAM --parameter-overrides Environment=dev GitHubOrg=${{ github.repository_owner }} GitHubRepo=${{ github.event.repository.name }} AlertEmail=${{ vars.ALERT_EMAIL }}
      - name: Remove failed security stack before retry
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name vowch-security-dev --query 'Stacks[0].StackStatus' --output text 2>/dev/null || true)
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            aws cloudformation delete-stack --stack-name vowch-security-dev
            aws cloudformation wait stack-delete-complete --stack-name vowch-security-dev
          fi
      - name: Deploy security stack
        run: sam deploy --template-file infra/security.yaml --stack-name vowch-security-dev --capabilities CAPABILITY_IAM --resolve-s3 --no-confirm-changeset --no-fail-on-empty-changeset --parameter-overrides Environment=dev
      - name: Resolve secure upload bucket
        run: |
          UPLOAD_BUCKET_NAME="$(aws cloudformation describe-stacks --stack-name vowch-security-dev --query 'Stacks[0].Outputs[?OutputKey==`UploadBucket`].OutputValue | [0]' --output text)"
          test -n "$UPLOAD_BUCKET_NAME" && test "$UPLOAD_BUCKET_NAME" != "None"
          echo "UPLOAD_BUCKET_NAME=$UPLOAD_BUCKET_NAME" >> "$GITHUB_ENV"
      - name: Build and deploy application
        env:
          PUBLIC_APP_ORIGIN: ${{ vars.PUBLIC_APP_ORIGIN || 'http://localhost:3000' }}
          PAYMENT_WEBHOOK_SECRET: ${{ secrets.PAYMENT_WEBHOOK_SECRET }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          MALWARE_SCAN_URL: ${{ secrets.MALWARE_SCAN_URL }}
          MALWARE_SCAN_TOKEN: ${{ secrets.MALWARE_SCAN_TOKEN }}
          PUSH_GATEWAY_URL: ${{ secrets.PUSH_GATEWAY_URL }}
          PUSH_GATEWAY_TOKEN: ${{ secrets.PUSH_GATEWAY_TOKEN }}
        run: |
          sam build --template-file backend/template.yaml
          parameters=(
            "Environment=dev"
            "PublicAppOrigin=$PUBLIC_APP_ORIGIN"
            "SsmPrefix=/vowch/dev"
            "GroqModel=$GROQ_MODEL"
            "UploadBucketName=$UPLOAD_BUCKET_NAME"
          )
          add_optional_parameter() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then parameters+=("$name=$value"); fi
          }
          add_optional_parameter PaymentWebhookSecret "$PAYMENT_WEBHOOK_SECRET"
          add_optional_parameter RazorpayKeyId "$RAZORPAY_KEY_ID"
          add_optional_parameter RazorpayKeySecret "$RAZORPAY_KEY_SECRET"
          add_optional_parameter GroqApiKey "$GROQ_API_KEY"
          add_optional_parameter GmailSmtpUser "$GMAIL_SMTP_USER"
          add_optional_parameter GmailAppPassword "$GMAIL_APP_PASSWORD"
          add_optional_parameter MalwareScanUrl "$MALWARE_SCAN_URL"
          add_optional_parameter MalwareScanToken "$MALWARE_SCAN_TOKEN"
          add_optional_parameter PushGatewayUrl "$PUSH_GATEWAY_URL"
          add_optional_parameter PushGatewayToken "$PUSH_GATEWAY_TOKEN"
          sam deploy --template-file backend/template.yaml --stack-name vowch-dev --region "$AWS_REGION" --capabilities CAPABILITY_IAM --resolve-s3 --no-confirm-changeset --no-fail-on-empty-changeset --parameter-overrides "${parameters[@]}"
      - name: Smoke test API
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name vowch-dev --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)
          curl --fail --retry 5 --retry-delay 5 "$API_URL/health"
          echo "VOWCH_API_URL=$API_URL" >> $GITHUB_ENV
      - name: Smoke test admin API
        if: ${{ env.COGNITO_ADMIN_TEST_TOKEN != '' }}
        env:
          AWS_INTEGRATION: 'true'
        run: npm run test:admin:integration --prefix backend
      - name: Backfill worker query indexes
        run: |
          export TABLE_NAME=$(aws cloudformation describe-stacks --stack-name vowch-dev --query "Stacks[0].Outputs[?OutputKey=='TableName'].OutputValue" --output text)
          npm run migrate:worker-indexes --prefix backend
